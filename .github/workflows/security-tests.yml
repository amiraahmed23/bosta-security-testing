name: Bosta Security API Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  security-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Newman
        run: npm install -g newman

      - name: Run Bosta Security Tests
        env:
          BASE_URL: https://stg-app.bosta.co
          AUTH_TOKEN: bca27763f5f30353ba0ee3d2ebd8951994f5016e269bbd781798e2884274d631
          EMAIL: amira.mosa+991@bosta.co
        run: newman run "Bosta Security Testing.postman_collection.json" --environment "Bosta Security Environment.postman_environment.json" --env-var "baseURL=$BASE_URL" --env-var "authToken=$AUTH_TOKEN" --env-var "email=$EMAIL" --reporters cli --reporter-cli-no-banner

name: Bosta Security API Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  security-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Newman
        run: npm install -g newman

      - name: Run Bosta Security Tests
        run: newman run "Bosta Security Testing.postman_collection.json" --environment "Bosta Security Environment.postman_environment.json" --reporters cli --reporter-cli-no-banner
